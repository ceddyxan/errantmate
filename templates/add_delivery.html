{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-light text-gray-900 mb-2">New Delivery</h1>
        <p class="text-gray-600">Create a new delivery record</p>
    </div>

    <!-- Form -->
    <form method="POST" action="{{ url_for('add_delivery') }}" class="space-y-8">
        <input type="hidden" name="browser_local_time" id="browser_local_time">
        
        <!-- Sender Section -->
        <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
            <h2 class="text-lg font-medium text-gray-900 mb-6 pb-3 border-b border-gray-100">Sender Details</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="sender_name" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" id="sender_name" name="sender_name" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                           placeholder="Enter sender's full name">
                </div>
                
                <div>
                    <label for="sender_phone" class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                    <input type="tel" id="sender_phone" name="sender_phone" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                           placeholder="0712345678" pattern="[0-9]{10,15}">
                </div>
            </div>
        </div>

        <!-- Recipient Section -->
        <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
            <h2 class="text-lg font-medium text-gray-900 mb-6 pb-3 border-b border-gray-100">Recipient Details</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label for="recipient_name" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" id="recipient_name" name="recipient_name" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                           placeholder="Enter recipient's full name">
                </div>
                
                <div>
                    <label for="recipient_phone" class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                    <input type="tel" id="recipient_phone" name="recipient_phone" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                           placeholder="0723456789" pattern="[0-9]{10,15}">
                </div>
            </div>
            
            <div>
                <label for="recipient_address" class="block text-sm font-medium text-gray-700 mb-2">Delivery Address</label>
                <textarea id="recipient_address" name="recipient_address" rows="3" required
                          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200 resize-none"
                          placeholder="Enter complete delivery address"></textarea>
            </div>
        </div>

        <!-- Delivery Details -->
        <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
            <h2 class="text-lg font-medium text-gray-900 mb-6 pb-3 border-b border-gray-100">Delivery Information</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="goods_type" class="block text-sm font-medium text-gray-700 mb-2">Goods Type</label>
                    <input type="text" id="goods_type" name="goods_type" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                           placeholder="e.g., Documents, Electronics">
                </div>
                
                <div>
                    <label for="quantity" class="block text-sm font-medium text-gray-700 mb-2">Quantity</label>
                    <input type="number" id="quantity" name="quantity" min="1" value="1" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200">
                </div>
            </div>
            
            <!-- Payment Section -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6 pt-6 border-t border-gray-100">
                <div>
                    <label for="payment_by" class="block text-sm font-medium text-gray-700 mb-2">Pickup Method</label>
                    <select id="payment_by" name="payment_by" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200">
                        <option value="Errant" selected>Errant (KSh 50)</option>
                        <option value="Pickup Location">Pickup Location (KSh 30)</option>
                    </select>
                </div>
                
                <div>
                    <label for="amount" class="block text-sm font-medium text-gray-700 mb-2">Amount (KSh)</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                           placeholder="0.00" readonly>
                </div>
            </div>
            
            <!-- Amount Display -->
            <div class="bg-gray-50 rounded-lg p-4 mt-6">
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div>
                        <div class="text-sm text-gray-600">Amount</div>
                        <div class="text-xl font-semibold text-gray-900">KSh <span id="displayAmount">50.00</span></div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-600">Service Fee</div>
                        <div class="text-xl font-semibold text-gray-900">KSh <span id="serviceFeeDisplay">0.00</span></div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-600">Total</div>
                        <div class="text-xl font-bold text-teal-600">KSh <span id="totalPayAmount">50.00</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Hidden status field -->
        <input type="hidden" id="status" name="status" value="Pending">

        <!-- Form Actions -->
        <div class="flex justify-end space-x-4 mt-8">
            <button type="button" onclick="window.history.back()" 
                    class="px-6 py-3 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition duration-200">
                Cancel
            </button>
            <button type="submit" 
                    class="px-10 py-4 bg-gradient-to-r from-teal-600 to-teal-700 text-white rounded-lg hover:from-teal-700 hover:to-teal-800 focus:ring-4 focus:ring-teal-300 focus:ring-offset-2 transition duration-200 text-lg font-semibold shadow-lg transform hover:scale-105">
                <i class="fas fa-plus-circle mr-2"></i>Create Delivery
            </button>
        </div>
    </form>

    <!-- Recent Deliveries Section -->
    <div class="mt-12">
        <div class="bg-white rounded-lg border border-gray-200 shadow-sm">
            <div class="px-6 py-4 border-b border-gray-100">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-medium text-gray-900">Recent Deliveries</h2>
                    <button onclick="refreshRecentDeliveries()" class="text-teal-600 hover:text-teal-700 p-2 rounded-full hover:bg-teal-50 transition-colors">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
            
            <div id="recentDeliveriesContent">
                <div class="p-6">
                    <div class="overflow-x-auto">
                        <table class="min-w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Sender</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Recipient</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Time</th>
                                </tr>
                            </thead>
                            <tbody id="recentDeliveriesBody" class="divide-y divide-gray-100">
                                <tr>
                                    <td colspan="5" class="px-4 py-8 text-center text-gray-500">
                                        <i class="fas fa-spinner fa-spin text-2xl mb-3"></i>
                                        <p>Loading recent deliveries...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Auto-set amount based on pickup method
function updatePaymentAmount() {
    const amountInput = document.getElementById('amount');
    const displayAmount = document.getElementById('displayAmount');
    const totalPayAmount = document.getElementById('totalPayAmount');
    const paymentBy = document.getElementById('payment_by').value;
    
    let amount = 0;
    if (paymentBy === 'Errant') {
        amount = 50;
    } else if (paymentBy === 'Pickup Location') {
        amount = 30;
    }
    
    amountInput.value = amount;
    displayAmount.textContent = amount.toFixed(2);
    totalPayAmount.textContent = amount.toFixed(2);
}

// Recent Deliveries functionality
function refreshRecentDeliveries() {
    const tbody = document.getElementById('recentDeliveriesBody');
    tbody.innerHTML = `
        <tr>
            <td colspan="5" class="px-4 py-8 text-center text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl mb-3"></i>
                <p>Loading recent deliveries...</p>
            </td>
        </tr>
    `;
    
    fetch('/get_user_recent_deliveries')
        .then(response => response.json())
        .then(data => {
            if (data.deliveries && data.deliveries.length > 0) {
                tbody.innerHTML = data.deliveries.map((delivery, index) => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-4 py-3 text-sm font-medium text-gray-900">${delivery.display_id}</td>
                        <td class="px-4 py-3 text-sm text-gray-500">
                            <div class="flex flex-col">
                                <span class="font-medium text-gray-900">${delivery.sender_name}</span>
                                <span class="text-xs text-gray-400">${delivery.sender_phone}</span>
                            </div>
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-500">
                            <div class="flex flex-col">
                                <span class="font-medium text-gray-900">${delivery.recipient_name}</span>
                                <span class="text-xs text-gray-400">${delivery.recipient_phone}</span>
                            </div>
                        </td>
                        <td class="px-4 py-3 whitespace-nowrap">
                            <span class="px-2 py-1 text-xs font-semibold rounded-full ${
                                delivery.status === 'Delivered' ? 'bg-green-100 text-green-800' :
                                delivery.status === 'In Transit' ? 'bg-blue-100 text-blue-800' :
                                'bg-gray-100 text-gray-800'
                            }">
                                ${delivery.status}
                            </span>
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-500">${formatTime(delivery.created_at)}</td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-4 py-8 text-center text-gray-500">
                            <i class="fas fa-inbox text-gray-400 text-2xl mb-3"></i>
                            <p>No recent deliveries found</p>
                        </td>
                    </tr>
                `;
            }
        })
        .catch(error => {
            console.error('Error loading recent deliveries:', error);
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="px-4 py-8 text-center text-gray-500">
                        <i class="fas fa-exclamation-triangle text-red-400 text-2xl mb-3"></i>
                        <p class="text-red-500">Error loading deliveries</p>
                    </td>
                </tr>
            `;
        });
}

function formatTime(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    
    if (diffMins < 60) {
        return `${diffMins} min ago`;
    } else if (diffMins < 1440) {
        return `${Math.floor(diffMins / 60)}h ago`;
    } else {
        return date.toLocaleDateString();
    }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    updatePaymentAmount();
    
    // Add change listener
    document.getElementById('payment_by').addEventListener('change', updatePaymentAmount);
    
    // Load recent deliveries
    refreshRecentDeliveries();
});
</script>
{% endblock %}
